<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Widget Demo</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0fdf4;
            color: #166534;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
        }

        .cta {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background-color: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>ACME Corp</h1>
    <p>We provide the best embedded solutions for your business. Chat with our AI assistant below to learn more!</p>
    <button class="cta">Get Started</button>

    <!-- Widget Configuration -->
    <script>
        window.ChatWidgetConfig = {
            apiUrl: "https://fastapi-chatbot-754369800088.europe-west1.run.app/chat", // Local — swap to Cloud Run URL once redeployed
            // botName and welcomeMessage are now optional since defaults are updated in widget.js
            // But we can override if needed:
            botName: "Agentica Support",
            themeColor: "#2563EB"
        };
    </script>

    <!-- Load Widget -->
    <script src="./widget.js"></script>
</body>

</html>
